<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega-Video</title>
    <link rel="icon" type="image/x-icon" href="/static/images/icon.ico">
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2.12.0/tsparticles.bundle.min.js"></script>
    <style>
        :root {
            --color-primary: #f01925;      --color-secondary: #1e1a31;     --color-accent: #ecb09c;
            --color-danger: #9b143a;        --color-dark: #6f153d;         --color-bright: #e62649;
            --color-soft: #e06d72;          --color-deep: #46143b;         --color-alert: #fe030d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }

        body {
            position: relative;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        #wallpaper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('/static/images/wall.jpg');
            background-size: cover;
            background-position: center;
            z-index: -2;
        }

        #tsparticles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .container {
            background: rgba(30, 26, 49, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 1200px;
            padding: 30px;
            border: 1px solid var(--color-accent);
            position: relative;
            z-index: 1;
            margin-bottom: 20px;
        }

        /* شريط الموقع العلوي */
        .top-bar {
            text-align: center;
            margin-bottom: 20px;
            padding: 8px 15px;
            background: rgba(0,0,0,0.4);
            border-radius: 50px;
            display: inline-block;
            width: auto;
            margin-left: auto;
            margin-right: auto;
        }
        .top-bar a {
            color: var(--color-accent);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }
        .top-bar a:hover {
            color: var(--color-primary);
        }

        h1 {
            text-align: center;
            color: var(--color-primary);
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .logo {
            width: 48px;
            height: 48px;
            border-radius: 12px;
        }

        .note {
            text-align: center;
            color: var(--color-accent);
            font-size: 14px;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        input {
            flex: 1;
            padding: 15px;
            border: 2px solid var(--color-soft);
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            font-size: 16px;
            color: white;
        }
        input:focus {
            border-color: var(--color-primary);
            outline: none;
        }
        input::placeholder {
            color: rgba(236, 176, 156, 0.7);
        }

        button {
            padding: 12px 25px;
            background: var(--color-primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        button:hover {
            background: var(--color-alert);
            transform: translateY(-2px);
        }
        button:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            text-align: center;
            color: var(--color-accent);
            margin: 20px 0;
        }

        .error {
            background: rgba(155, 20, 58, 0.3);
            color: var(--color-alert);
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: center;
            border: 1px solid var(--color-danger);
        }

        .video-card {
            background: rgba(30, 26, 49, 0.7);
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid var(--color-accent);
        }

        .video-header {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .thumbnail {
            width: 200px;
            height: 112px;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid var(--color-soft);
        }

        .video-title {
            flex: 1;
            font-size: 18px;
            font-weight: bold;
            color: white;
            line-height: 1.5;
            text-shadow: 1px 1px 2px black;
        }

        .format-section {
            margin-bottom: 30px;
        }

        .format-section h3 {
            color: var(--color-accent);
            font-size: 18px;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--color-soft);
            padding-bottom: 5px;
        }

        .formats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 10px;
        }

        .format-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: rgba(236, 176, 156, 0.1);
            border: 1px solid var(--color-soft);
            border-radius: 8px;
        }
        .format-item:hover {
            border-color: var(--color-primary);
            background: rgba(240, 25, 37, 0.2);
        }

        .format-info {
            display: flex;
            flex-direction: column;
        }

        .quality {
            font-weight: bold;
            color: white;
            font-size: 15px;
        }

        .size {
            color: var(--color-accent);
            font-size: 13px;
            margin-top: 3px;
        }

        .download-btn {
            padding: 6px 15px;
            background: var(--color-bright);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
            font-weight: bold;
            min-width: 80px;
        }
        .download-btn:hover {
            background: var(--color-alert);
        }
        .download-btn:disabled {
            background: #555;
            cursor: wait;
        }

        .downloads-panel {
            background: rgba(30, 26, 49, 0.9);
            backdrop-filter: blur(5px);
            border-radius: 10px;
            padding: 20px;
            margin-top: 30px;
            border: 1px solid var(--color-accent);
        }
        .downloads-panel h2 {
            color: var(--color-primary);
            margin-bottom: 20px;
            font-size: 24px;
        }
        .downloads-panel h3 {
            color: var(--color-accent);
            margin: 15px 0 10px;
            font-size: 18px;
        }

        .download-item {
            background: rgba(0,0,0,0.2);
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 3px solid var(--color-primary);
        }
        .download-item.completed { border-left-color: #4caf50; }
        .download-item.error { border-left-color: #f44336; }
        .download-item.paused { border-left-color: #ff9800; }

        .download-item strong {
            color: white;
            display: block;
            margin-bottom: 8px;
        }

        .phase-info {
            color: var(--color-accent);
            font-size: 13px;
            margin: 5px 0;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #555;
            border-radius: 5px;
            margin: 8px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--color-primary);
            transition: width 0.2s;
        }

        .download-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 10px;
        }
        .download-actions button {
            padding: 5px 10px;
            font-size: 12px;
            background: var(--color-deep);
            border: 1px solid var(--color-soft);
            border-radius: 3px;
            color: white;
            cursor: pointer;
        }
        .download-actions button:hover {
            background: var(--color-dark);
        }

        .filename {
            color: #aaa;
            font-size: 12px;
            word-break: break-all;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div id="wallpaper"></div>
    <div id="tsparticles"></div>

    <div class="container">
        <!-- رابط الموقع في الأعلى -->
        <div style="text-align: center; margin-bottom: 15px;">
            <div class="top-bar">
                <a href="https://sarok-archive.pages.dev" target="_blank" rel="noopener noreferrer">
                    🌐 Visit my website: sarok-archive.pages.dev
                </a>
            </div>
        </div>

        <h1>
            <img src="/static/images/icon.png" alt="Mega-Video Logo" class="logo">
            Mega-Video Downloader
        </h1>
        <p class="note">✨ MP4 merged first - Other formats can be merged with best audio</p>
        
        <div class="input-group">
            <input type="text" id="url" placeholder="Enter video URL (YouTube, Vimeo, etc.)">
            <button onclick="getInfo()" id="fetchBtn">Get Info</button>
        </div>
        
        <div id="loading" class="loading" style="display: none;">Loading...</div>
        <div id="error" class="error" style="display: none;"></div>
        
        <div id="videoInfo" style="display: none;">
            <div class="video-card">
                <div class="video-header">
                    <img id="thumbnail" class="thumbnail" src="" alt="Video thumbnail">
                    <div id="videoTitle" class="video-title"></div>
                </div>
                
                <div id="formatsContainer"></div>
            </div>
        </div>

        <!-- Download Manager Panel -->
        <div class="downloads-panel">
            <h2>📋 Download Manager</h2>
            <div id="activeDownloads">
                <h3>⏳ Active Downloads</h3>
                <div id="activeList"></div>
            </div>
            <div id="completedDownloads">
                <h3>✅ Completed</h3>
                <div id="completedList"></div>
            </div>
        </div>
    </div>

    <script>
        tsParticles.load({
            id: "tsparticles",
            options: {
                background: { color: "transparent" },
                particles: {
                    number: { value: 80 },
                    color: { value: ["#f01925", "#ecb09c", "#e62649", "#e06d72", "#fe030d"] },
                    shape: { type: "circle" },
                    opacity: { value: 0.5, random: true },
                    size: { value: 3, random: true },
                    move: { enable: true, speed: 1.5 },
                    links: { enable: true, color: "#ecb09c", opacity: 0.3 }
                },
                interactivity: {
                    events: { onHover: { enable: true, mode: "repulse" } }
                }
            }
        });

        let activeDownloads = {};
        let completedDownloads = {};

        setInterval(refreshDownloads, 2000);

        async function refreshDownloads() {
            try {
                const response = await fetch('/downloads-list');
                const data = await response.json();
                activeDownloads = data.active || {};
                completedDownloads = data.completed || {};
                renderDownloads();
            } catch (e) {
                console.error('Refresh failed', e);
            }
        }

        function renderDownloads() {
            const activeList = document.getElementById('activeList');
            const completedList = document.getElementById('completedList');
            
            let activeHtml = '';
            for (const [tid, info] of Object.entries(activeDownloads)) {
                const prog = info.progress || { percent: 0 };
                const phase = info.phase || 'downloading';
                const totalPhases = info.total_phases || 1;
                const currentPhase = info.current_phase || 1;
                
                let overallPercent = 0;
                if (totalPhases > 1 && prog.percent !== undefined) {
                    const phaseContribution = 1 / totalPhases;
                    const baseProgress = (currentPhase - 1) * phaseContribution;
                    overallPercent = (baseProgress + (prog.percent / 100) * phaseContribution) * 100;
                } else {
                    overallPercent = prog.percent || 0;
                }
                
                let phaseText = '';
                switch (phase) {
                    case 'downloading_video': phaseText = `📹 Downloading video (${currentPhase}/${totalPhases})`; break;
                    case 'downloading_audio': phaseText = `🎵 Downloading audio (${currentPhase}/${totalPhases})`; break;
                    case 'merging': phaseText = `🔧 Merging files (${currentPhase}/${totalPhases})`; break;
                    default: phaseText = `⏳ Processing (${currentPhase}/${totalPhases})`;
                }
                
                const speed = prog.speed ? (prog.speed/1024/1024).toFixed(2) + ' MB/s' : '';
                const eta = prog.eta ? formatTime(prog.eta) : '';
                
                activeHtml += `
                    <div class="download-item ${info.status}" data-task="${tid}">
                        <strong>${info.title || 'Loading...'}</strong>
                        <div class="phase-info">${phaseText}</div>
                        <div class="progress-bar"><div class="progress-fill" style="width:${overallPercent}%"></div></div>
                        <div style="color: #ccc; font-size:13px;">
                            ${overallPercent.toFixed(1)}% ${speed ? ' | ' + speed : ''} ${eta ? ' | ETA ' + eta : ''}
                        </div>
                        <div class="download-actions">
                            <button onclick="controlTask('${tid}', 'pause')" ${info.paused ? 'disabled' : ''}>⏸️ Pause</button>
                            <button onclick="controlTask('${tid}', 'resume')" ${!info.paused ? 'disabled' : ''}>▶️ Resume</button>
                            <button onclick="controlTask('${tid}', 'cancel')">⏹️ Cancel</button>
                            <button onclick="copyLink('${info.url || ''}')">🔗 Copy URL</button>
                            <button onclick="watchVideo('${info.url || ''}')">👁️ Watch</button>
                        </div>
                    </div>
                `;
            }
            activeList.innerHTML = activeHtml || '<div style="color:#888; padding:10px;">No active downloads</div>';

            let completedHtml = '';
            for (const [tid, info] of Object.entries(completedDownloads)) {
                if (info.status === 'completed' && info.filename) {
                    completedHtml += `
                        <div class="download-item completed">
                            <strong>${info.title || 'Completed'}</strong>
                            <div class="filename">${info.filename}</div>
                            <div class="download-actions">
                                <button onclick="playFile('${info.filename}')">▶️ Play</button>
                                <button onclick="openFolder('${info.filename}')">📂 Open Folder</button>
                                <button onclick="copyLink('${info.url || ''}')">🔗 Copy URL</button>
                                <button onclick="deleteDownload('${tid}')">🗑️ Delete</button>
                            </div>
                        </div>
                    `;
                } else if (info.status === 'error') {
                    completedHtml += `
                        <div class="download-item error">
                            <strong>Error</strong>: ${info.error || 'Unknown error'}
                            <div class="download-actions">
                                <button onclick="deleteDownload('${tid}')">🗑️ Delete</button>
                            </div>
                        </div>
                    `;
                }
            }
            completedList.innerHTML = completedHtml || '<div style="color:#888; padding:10px;">No completed downloads</div>';
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2,'0')}`;
        }

        async function controlTask(taskId, action) {
            try {
                await fetch('/control', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({task_id: taskId, action: action})
                });
                refreshDownloads();
            } catch (e) {
                alert('Failed to execute command');
            }
        }

        function copyLink(url) {
            navigator.clipboard.writeText(url);
            alert('Link copied');
        }

        function watchVideo(url) {
            window.open(url, '_blank');
        }

        function playFile(filename) {
            window.open(`/play/${filename}`, '_blank');
        }

        function openFolder(filename) {
            navigator.clipboard.writeText(`~/Videos/Mega-Video-Downloads/${filename}`);
            alert('File path copied to clipboard. You can paste it in your file manager.');
        }

        async function deleteDownload(taskId) {
            if (!confirm('Do you want to delete this download?')) return;
            try {
                await fetch(`/delete/${taskId}`, {method: 'DELETE'});
                refreshDownloads();
            } catch (e) {
                alert('Deletion failed');
            }
        }

        async function getInfo() {
            const url = document.getElementById('url').value;
            if (!url) { alert('Please enter a URL'); return; }
            
            document.getElementById('fetchBtn').disabled = true;
            document.getElementById('loading').style.display = 'block';
            document.getElementById('error').style.display = 'none';
            document.getElementById('videoInfo').style.display = 'none';
            
            try {
                const response = await fetch('/get-info', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url: url})
                });
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('videoTitle').textContent = data.title;
                    document.getElementById('thumbnail').src = data.thumbnail;
                    
                    let html = '';
                    
                    if (data.merged_formats?.length) {
                        html += '<div class="format-section"><h3>📹 MP4 (Video+Audio)</h3><div class="formats-grid">';
                        data.merged_formats.forEach(f => html += formatItem(f, url, 'merged'));
                        html += '</div></div>';
                    }
                    
                    if (data.video_only_formats?.length) {
                        html += '<div class="format-section"><h3>🎬 Video only (will be merged with best audio)</h3><div class="formats-grid">';
                        data.video_only_formats.forEach(f => html += formatItem(f, url, 'video'));
                        html += '</div></div>';
                    }
                    
                    if (data.audio_formats?.length) {
                        html += '<div class="format-section"><h3>🔊 Audio only</h3><div class="formats-grid">';
                        data.audio_formats.forEach(f => html += formatItem(f, url, 'audio'));
                        html += '</div></div>';
                    }
                    
                    document.getElementById('formatsContainer').innerHTML = html;
                    document.getElementById('videoInfo').style.display = 'block';
                } else {
                    showError(data.error);
                }
            } catch (error) {
                showError(error.message);
            }
            
            document.getElementById('fetchBtn').disabled = false;
            document.getElementById('loading').style.display = 'none';
        }

        function formatItem(f, url, type) {
            const size = f.filesize ? ` (${(f.filesize/1024/1024).toFixed(2)} MB)` : ' (unknown size)';
            let qualityText = f.quality;
            if (type === 'audio') qualityText += ' audio';
            
            return `
                <div class="format-item" id="item-${f.format_id}">
                    <div class="format-info">
                        <span class="quality">${qualityText}</span>
                        <span class="size">${size}</span>
                    </div>
                    <button class="download-btn" onclick="downloadVideo('${url}', '${f.format_id}', this)">Download</button>
                </div>
            `;
        }

        async function downloadVideo(url, formatId, btn) {
            btn.disabled = true;
            btn.textContent = 'Starting...';
            
            try {
                const response = await fetch('/download', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url: url, format_id: formatId})
                });
                const data = await response.json();
                
                if (data.success) {
                    btn.textContent = 'Added!';
                    refreshDownloads();
                } else {
                    alert('Error starting download');
                    btn.disabled = false;
                    btn.textContent = 'Download';
                }
            } catch (error) {
                alert('Error: ' + error.message);
                btn.disabled = false;
                btn.textContent = 'Download';
            }
        }

        function showError(message) {
            document.getElementById('error').textContent = '❌ Error: ' + message;
            document.getElementById('error').style.display = 'block';
        }

        refreshDownloads();

         window.addEventListener('beforeunload', function() {
    navigator.sendBeacon('/shutdown');
});
    </script>
</body>
</html>
